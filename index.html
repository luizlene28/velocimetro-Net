<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetSpeed Pro | Internet Velocimeter</title>
    
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #3498db;
            --accent-light: #5dade2;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --border: #e1e8ed;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .app-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .provider-badge {
            background: #f0f4ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            border: 1px solid #d1d9ff;
        }

        .speedometer-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 24px;
            aspect-ratio: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .speed-digital {
            text-align: center;
            margin-bottom: 20px;
        }

        .speed-value {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
        }

        .speed-unit {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 11px;
            margin-top: 2px;
        }

        .positive { color: var(--success); }
        .negative { color: var(--danger); }

        .network-indicator {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .network-type {
            font-weight: 600;
            font-size: 14px;
            color: #166534;
        }

        .network-signal {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }

        .signal-bar {
            width: 3px;
            background: #22c55e;
            border-radius: 2px;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-secondary);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a2e;
                --bg-secondary: #16213e;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0a0;
                --border: #2a2a4a;
            }
            body { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); }
            .stat-card { background: #1e2a4a; }
            .btn-outline { background: #16213e; color: #e0e0e0; }
            .network-indicator { background: #1a2e1a; border-color: #2a4a2a; }
            .network-type { color: #4ade80; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div>
                <div class="app-title">NetSpeed Pro</div>
                <div class="app-subtitle">Internet Velocimeter</div>
            </div>
            <div class="provider-badge">🌐 Fiber</div>
        </div>

        <div class="speedometer-wrapper">
            <canvas id="speedometer" width="380" height="380"></canvas>
        </div>

        <div class="speed-digital">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">Megabits por segundo</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📊 Download</div>
                <div class="stat-value" id="downloadSpeed">0</div>
                <div class="stat-change positive">↑ Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📤 Upload</div>
                <div class="stat-value" id="uploadSpeed">0</div>
                <div class="stat-change">↑ Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 Pico</div>
                <div class="stat-value" id="peakSpeed">0</div>
                <div class="stat-change">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ Latência</div>
                <div class="stat-value" id="latency">0</div>
                <div class="stat-change negative">ms</div>
            </div>
        </div>

        <div class="network-indicator">
            <div class="network-type" id="networkType">📱 5G - Conectado</div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="btnTest" onclick="startSpeedTest()">🚀 Testar Velocidade</button>
            <button class="btn btn-outline" onclick="resetData()">🔄 Resetar</button>
        </div>

        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot"></div>
                <span>Conectado</span>
            </div>
            <div class="timestamp" id="lastUpdate">Último teste: --:--</div>
        </div>
    </div>

    <script>
        const state = {
            currentSpeed: 0, downloadSpeed: 0, uploadSpeed: 0, peakSpeed: 0,
            latency: 0, targetSpeed: 0, isTestRunning: false
        };

        const canvas = document.getElementById('speedometer');
        const ctx = canvas.getContext('2d');
        const speedValue = document.getElementById('speedValue');
        const downloadSpeed = document.getElementById('downloadSpeed');
        const uploadSpeed = document.getElementById('uploadSpeed');
        const peakSpeed = document.getElementById('peakSpeed');
        const latency = document.getElementById('latency');

        function drawSpeedometer(speed) {
            const centerX = 190, centerY = 190, radius = 145;
            ctx.clearRect(0, 0, 380, 380);
            const startAngle = Math.PI * 0.7, endAngle = Math.PI * 2.3;
            const totalAngle = endAngle - startAngle;
            const maxSpeed = 800;

            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, endAngle);
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 12; ctx.stroke();

            const activeAngle = startAngle + (Math.min(speed, maxSpeed) / maxSpeed) * totalAngle;
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, startAngle, activeAngle);
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 12; ctx.stroke();

            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate(activeAngle);
            ctx.beginPath();
            ctx.moveTo(0, -4); ctx.lineTo(radius - 20, 0); ctx.lineTo(0, 4);
            ctx.fillStyle = '#1e293b'; ctx.fill();
            ctx.restore();
        }

        function animateSpeed() {
            const diff = state.targetSpeed - state.currentSpeed;
            if (Math.abs(diff) > 0.1) {
                state.currentSpeed += diff * 0.1;
                speedValue.textContent = Math.round(state.currentSpeed);
                drawSpeedometer(state.currentSpeed);
                requestAnimationFrame(animateSpeed);
            }
        }

        function startSpeedTest() {
            if (state.isTestRunning) return;
            state.isTestRunning = true;
            document.getElementById('btnTest').textContent = '⏳ Analisando...';

            let progress = 0;
            let testCompleted = false; // Trava de segurança para enviar apenas 1 vez

            const testInterval = setInterval(() => {
                if (testCompleted) return;

                progress += Math.random() * 80;
                state.targetSpeed = progress;
                animateSpeed();

                if (progress >= 800) {
                    testCompleted = true; // Trava o código aqui
                    clearInterval(testInterval);
                    
                    const finalD = Math.round(550 + Math.random() * 200);
                    const finalU = Math.round(finalD * 0.5);
                    const finalP = Math.round(10 + Math.random() * 15);
                    
                    state.targetSpeed = finalD;
                    state.isTestRunning = false;
                    document.getElementById('btnTest').textContent = '🚀 Testar Velocidade';
                    
                    downloadSpeed.textContent = finalD;
                    uploadSpeed.textContent = finalU;
                    latency.textContent = finalP;
                    
                    if(finalD > state.peakSpeed) { 
                        state.peakSpeed = finalD; 
                        peakSpeed.textContent = finalD; 
                    }
                    
                    document.getElementById('lastUpdate').textContent = 'Último: ' + new Date().toLocaleTimeString();

                    // --- ENVIO TOTALMENTE LIMPO, TRATADO E ESTÁVEL PARA O KODULAR ---
                    const dadosFinais = String(finalD) + "|" + String(finalU) + "|" + String(finalP);
                    if (window.AppInventor) {
                        window.AppInventor.setWebViewString(dadosFinais);
                    }
                }
            }, 100);
        }

        function resetData() {
            state.targetSpeed = 0; animateSpeed();
            downloadSpeed.textContent = '0'; uploadSpeed.textContent = '0';
            latency.textContent = '0'; peakSpeed.textContent = '0';
        }

        drawSpeedometer(0);
    </script>
</body>
</html>
