<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VelozNet-LC | Internet Velocimeter</title>

    <style>
        :root {
            --bg-primary: #0a0a14;
            --bg-secondary: #12121f;
            --text-primary: #e8e8f0;
            --text-secondary: #9898b0;
            --accent: #4d7cff;
            --accent-light: #6b9fff;
            --danger: #ff4757;
            --warning: #ffa502;
            --success: #2ed573;
            --border: #2a2a40;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            --shadow-lg: 0 15px 50px rgba(0, 0, 0, 0.7);
            --radius: 20px;
            --radius-sm: 12px;
            --glass: rgba(20, 20, 40, 0.7);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: radial-gradient(ellipse at center, #1a1a35 0%, #0a0a18 70%, #050510 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Efeito de partículas no fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background:
                radial-gradient(2px 2px at 20% 30%, rgba(100, 150, 255, 0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(100, 150, 255, 0.2), transparent),
                radial-gradient(1px 1px at 60% 20%, rgba(255, 255, 255, 0.3), transparent),
                radial-gradient(1px 1px at 80% 50%, rgba(100, 150, 255, 0.25), transparent),
                radial-gradient(2px 2px at 10% 60%, rgba(255, 255, 255, 0.2), transparent),
                radial-gradient(1px 1px at 70% 80%, rgba(100, 150, 255, 0.3), transparent),
                radial-gradient(1px 1px at 30% 15%, rgba(255, 255, 255, 0.25), transparent),
                radial-gradient(2px 2px at 90% 40%, rgba(100, 150, 255, 0.2), transparent);
            animation: particlesFloat 20s ease-in-out infinite;
        }

        @keyframes particlesFloat {
            0%,
            100% {
                opacity: 0.6;
            }
            25% {
                opacity: 0.9;
            }
            50% {
                opacity: 0.5;
            }
            75% {
                opacity: 0.8;
            }
        }

        .app-container {
            width: 100%;
            max-width: 440px;
            background: linear-gradient(160deg, rgba(25, 25, 50, 0.95) 0%, rgba(18, 18, 38, 0.98) 40%, rgba(10, 10, 28, 0.99) 100%);
            border-radius: 36px;
            padding: 20px 18px 22px;
            box-shadow:
                0 25px 70px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 1px 0 rgba(255, 255, 255, 0.04);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.3s ease;
        }

        /* Faixa colorida no topo estilo painel esportivo */
        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #ff4757 0%, #ff6b81 20%, #ffa502 40%, #2ed573 60%, #4d7cff 80%, #a78bfa 100%);
            border-radius: 36px 36px 0 0;
            box-shadow: 0 3px 25px rgba(77, 124, 255, 0.5), 0 1px 0 rgba(255, 255, 255, 0.1);
            z-index: 2;
        }

        /* Aparafusos decorativos nos cantos */
        .app-container::after {
            content: '';
            position: absolute;
            top: 16px;
            left: 16px;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, #555 0%, #222 100%);
            border-radius: 50%;
            box-shadow:
                0 0 0 2px rgba(0, 0, 0, 0.5),
                0 2px 4px rgba(0, 0, 0, 0.5),
                386px 0 0 0 #222,
                386px 0 0 2px rgba(0, 0, 0, 0.5),
                386px 0 4px 0 rgba(0, 0, 0, 0.3),
                0 620px 0 0 #222,
                0 620px 0 2px rgba(0, 0, 0, 0.5),
                386px 620px 0 0 #222,
                386px 620px 0 2px rgba(0, 0, 0, 0.5);
            z-index: 3;
            pointer-events: none;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 4px;
            position: relative;
            z-index: 1;
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: -0.3px;
            text-shadow: 0 2px 15px rgba(77, 124, 255, 0.4);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .app-title .icon {
            font-size: 24px;
            filter: drop-shadow(0 0 8px rgba(77, 124, 255, 0.6));
        }

        .app-subtitle {
            font-size: 11px;
            color: #8888a8;
            margin-top: 1px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .provider-badge {
            background: linear-gradient(135deg, rgba(77, 124, 255, 0.2), rgba(167, 139, 250, 0.2));
            padding: 7px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: #a78bfa;
            border: 1px solid rgba(167, 139, 250, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            letter-spacing: 0.3px;
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.15);
        }

        /* Container do velocímetro */
        .speedometer-wrapper {
            position: relative;
            width: 100%;
            max-width: 360px;
            margin: 0 auto 12px;
            aspect-ratio: 1 / 1;
            filter: drop-shadow(0 15px 40px rgba(0, 0, 0, 0.7));
            z-index: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Display digital com estilo automotivo */
        .speed-digital {
            text-align: center;
            margin-bottom: 14px;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.5) 0%, rgba(15, 15, 30, 0.6) 100%);
            border-radius: 16px;
            padding: 12px 16px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 3px 15px rgba(0, 0, 0, 0.5), 0 4px 15px rgba(0, 0, 0, 0.4);
            position: relative;
            z-index: 1;
        }

        .speed-value {
            font-size: 52px;
            font-weight: 900;
            letter-spacing: -3px;
            background: linear-gradient(180deg, #ffffff 0%, #a0c4ff 40%, #4d7cff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            text-shadow: none;
            filter: drop-shadow(0 0 20px rgba(77, 124, 255, 0.6));
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
        }

        .speed-unit {
            font-size: 12px;
            color: #8899bb;
            font-weight: 500;
            margin-top: 2px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Grid de estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 12px;
            z-index: 1;
            position: relative;
        }

        .stat-card {
            background: linear-gradient(160deg, rgba(22, 22, 45, 0.85) 0%, rgba(16, 16, 35, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius-sm);
            padding: 12px 10px;
            transition: all 0.35s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.4);
            cursor: default;
        }

        .stat-card:hover {
            background: linear-gradient(160deg, rgba(30, 30, 55, 0.9) 0%, rgba(22, 22, 45, 0.95) 100%);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(77, 124, 255, 0.2);
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8888b0;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
        }

        .stat-change {
            font-size: 10px;
            margin-top: 2px;
            letter-spacing: 0.5px;
        }

        .positive {
            color: #2ed573;
        }
        .negative {
            color: #ff6b81;
        }

        /* Indicador de rede detalhado */
        .network-indicator {
            background: linear-gradient(160deg, rgba(46, 213, 115, 0.08) 0%, rgba(77, 124, 255, 0.08) 100%);
            border: 1px solid rgba(46, 213, 115, 0.25);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 6px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            z-index: 1;
            position: relative;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
        }

        .network-info-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .network-type {
            font-weight: 700;
            font-size: 13px;
            color: #2ed573;
            text-shadow: 0 0 12px rgba(46, 213, 115, 0.4);
            letter-spacing: 0.3px;
        }

        .network-name {
            font-size: 11px;
            color: #a0a0c0;
            background: rgba(255, 255, 255, 0.05);
            padding: 3px 10px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 140px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .carrier-name {
            font-size: 10px;
            color: #ffa502;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-shadow: 0 0 8px rgba(255, 165, 2, 0.3);
        }

        .signal-strength {
            display: flex;
            gap: 2px;
            align-items: flex-end;
            height: 18px;
        }

        .signal-bar {
            width: 4px;
            background: linear-gradient(180deg, #2ed573 0%, #4d7cff 100%);
            border-radius: 3px;
            box-shadow: 0 0 10px rgba(46, 213, 115, 0.6);
            transition: all 0.5s ease;
        }

        /* Botões */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            z-index: 1;
            position: relative;
        }

        .btn {
            flex: 1;
            min-width: 90px;
            padding: 13px 14px;
            border-radius: 25px;
            border: none;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
            text-align: center;
            position: relative;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            font-family: inherit;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.7s, height 0.7s;
            pointer-events: none;
        }

        .btn:active::after {
            width: 400px;
            height: 400px;
            transition: width 0s, height 0s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #4d7cff 0%, #6c5ce7 100%);
            color: white;
            box-shadow: 0 6px 25px rgba(77, 124, 255, 0.45);
            letter-spacing: 0.5px;
        }

        .btn-primary:hover {
            box-shadow: 0 10px 35px rgba(77, 124, 255, 0.65);
            transform: translateY(-2px);
        }
        .btn-primary:active {
            transform: scale(0.96);
            box-shadow: 0 3px 15px rgba(77, 124, 255, 0.5);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.04);
            color: #ccd;
            border: 2px solid rgba(255, 255, 255, 0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .btn-outline:hover {
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .btn-outline:active {
            transform: scale(0.96);
        }

        /* Barra de status inferior */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 1;
            position: relative;
            flex-wrap: wrap;
            gap: 8px;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 11px;
            color: #9999b8;
        }

        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #2ed573;
            animation: pulse 2s infinite;
            box-shadow: 0 0 12px rgba(46, 213, 115, 0.7);
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.4;
                transform: scale(1.3);
            }
        }

        .timestamp {
            font-size: 10px;
            color: #8888aa;
            letter-spacing: 0.5px;
        }

        /* ========== RESPONSIVIDADE ========== */
        @media screen and (max-width: 480px) {
            .app-container {
                border-radius: 28px;
                padding: 16px 12px 18px;
                max-width: 100%;
            }
            .app-container::before {
                border-radius: 28px 28px 0 0;
                height: 4px;
            }
            .speedometer-wrapper {
                max-width: 280px;
            }
            .speed-value {
                font-size: 40px;
                letter-spacing: -2px;
            }
            .stat-value {
                font-size: 17px;
            }
            .stat-card {
                padding: 10px 8px;
            }
            .btn {
                padding: 11px 10px;
                font-size: 12px;
                min-width: 70px;
            }
            .app-title {
                font-size: 17px;
            }
            .network-name {
                max-width: 100px;
                font-size: 10px;
            }
        }

        @media screen and (min-width: 768px) {
            .app-container {
                max-width: 460px;
                padding: 28px 24px 28px;
            }
            .speedometer-wrapper {
                max-width: 380px;
            }
            .speed-value {
                font-size: 58px;
            }
            .stat-value {
                font-size: 22px;
            }
            .btn {
                padding: 14px 20px;
                font-size: 14px;
            }
        }

        @media screen and (min-width: 1024px) {
            body {
                padding: 20px;
            }
            .app-container {
                max-width: 480px;
            }
            .speedometer-wrapper {
                max-width: 400px;
            }
        }

        /* Suporte para telas muito pequenas */
        @media screen and (max-width: 360px) {
            .speedometer-wrapper {
                max-width: 240px;
            }
            .speed-value {
                font-size: 34px;
            }
            .stat-value {
                font-size: 15px;
            }
            .stat-label {
                font-size: 9px;
            }
            .btn {
                padding: 10px 8px;
                font-size: 11px;
            }
            .app-title {
                font-size: 15px;
            }
        }

        /* Modo claro (respeita preferência do sistema) */
        @media (prefers-color-scheme: light) {
            body {
                background: radial-gradient(ellipse at center, #e8ecf1 0%, #d0d5e0 70%, #bcc3d0 100%);
            }
            body::before {
                background:
                    radial-gradient(2px 2px at 20% 30%, rgba(100, 130, 180, 0.4), transparent),
                    radial-gradient(1px 1px at 60% 20%, rgba(80, 100, 150, 0.35), transparent),
                    radial-gradient(2px 2px at 80% 50%, rgba(100, 130, 180, 0.3), transparent),
                    radial-gradient(1px 1px at 40% 70%, rgba(80, 100, 150, 0.35), transparent);
            }
            .app-container {
                background: linear-gradient(160deg, rgba(250, 250, 255, 0.95) 0%, rgba(240, 240, 248, 0.98) 40%, rgba(230, 230, 242, 0.99) 100%);
                border: 1px solid rgba(0, 0, 0, 0.1);
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(0, 0, 0, 0.05);
            }
            .app-title {
                color: #1a1a2e;
                text-shadow: 0 2px 10px rgba(77, 124, 255, 0.2);
            }
            .stat-value {
                color: #1a1a2e;
                text-shadow: none;
            }
            .speed-value {
                background: linear-gradient(180deg, #1a1a2e 0%, #4d7cff 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                filter: drop-shadow(0 0 10px rgba(77, 124, 255, 0.3));
            }
            .stat-card {
                background: rgba(255, 255, 255, 0.8);
                border: 1px solid rgba(0, 0, 0, 0.08);
                box-shadow: 0 3px 12px rgba(0, 0, 0, 0.06);
            }
            .network-indicator {
                background: rgba(46, 213, 115, 0.05);
                border: 1px solid rgba(46, 213, 115, 0.3);
            }
            .btn-outline {
                border-color: rgba(0, 0, 0, 0.2);
                color: #333;
                background: rgba(0, 0, 0, 0.02);
            }
            .btn-outline:hover {
                border-color: rgba(0, 0, 0, 0.4);
                background: rgba(0, 0, 0, 0.05);
            }
            .speed-digital {
                background: rgba(255, 255, 255, 0.7);
                border: 1px solid rgba(0, 0, 0, 0.1);
                box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.06), 0 3px 10px rgba(0, 0, 0, 0.08);
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Cabeçalho -->
        <div class="app-header">
            <div>
                <div class="app-title">
                    <span class="icon">⚡</span> NetSpeed Pro
                </div>
                <div class="app-subtitle">Internet Velocimeter</div>
            </div>
            <div class="provider-badge" id="badgeNetwork">🌐 Real Time</div>
        </div>

        <!-- Velocímetro (Canvas) -->
        <div class="speedometer-wrapper">
            <canvas id="speedometer" width="400" height="400" aria-label="Velocímetro de internet"></canvas>
        </div>

        <!-- Display digital -->
        <div class="speed-digital">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">Megabits por segundo (Mbps)</div>
        </div>

        <!-- Cards de estatísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📥 Download</div>
                <div class="stat-value" id="downloadSpeed">0</div>
                <div class="stat-change positive">Mbps ↓</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📤 Upload</div>
                <div class="stat-value" id="uploadSpeed">0</div>
                <div class="stat-change">Mbps ↑</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🏔️ Pico</div>
                <div class="stat-value" id="peakSpeed">0</div>
                <div class="stat-change">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ Latência</div>
                <div class="stat-value" id="latency">0</div>
                <div class="stat-change negative">ms</div>
            </div>
        </div>

        <!-- Indicador de rede detalhado -->
        <div class="network-indicator" id="networkIndicator">
            <div class="network-info-group">
                <span class="network-type" id="networkType">📶 Detectando...</span>
                <span class="network-name" id="wifiSSID" title="SSID da rede Wi-Fi">—</span>
                <span class="carrier-name" id="carrierName" title="Operadora">—</span>
            </div>
            <div class="signal-strength" id="signalBars" title="Intensidade do sinal">
                <div class="signal-bar" style="height:6px;"></div>
                <div class="signal-bar" style="height:10px;"></div>
                <div class="signal-bar" style="height:14px;"></div>
                <div class="signal-bar" style="height:18px;"></div>
            </div>
        </div>

        <!-- Botões de ação -->
        <div class="action-buttons">
            <button class="btn btn-primary" id="btnTest" onclick="startSpeedTest()">🚀 Testar Velocidade</button>
            <button class="btn btn-outline" onclick="resetData()">🔄 Resetar</button>
        </div>

        <!-- Barra de status -->
        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Conectado</span>
            </div>
            <div class="timestamp" id="lastUpdate">Último teste: --:--</div>
        </div>
    </div>

    <script>
        (function() {
            // ============ ESTADO GLOBAL ============
            const state = {
                currentSpeed: 0,
                downloadSpeed: 0,
                uploadSpeed: 0,
                peakSpeed: 0,
                latency: 0,
                targetSpeed: 0,
                isTestRunning: false,
                wifiSSID: '—',
                carrierName: '—',
                networkTypeStr: 'Detectando...',
                signalLevel: 0,
                animationId: null,
            };

            // ============ ELEMENTOS DOM ============
            const canvas = document.getElementById('speedometer');
            const ctx = canvas.getContext('2d');
            const speedValueEl = document.getElementById('speedValue');
            const downloadSpeedEl = document.getElementById('downloadSpeed');
            const uploadSpeedEl = document.getElementById('uploadSpeed');
            const peakSpeedEl = document.getElementById('peakSpeed');
            const latencyEl = document.getElementById('latency');
            const networkTypeEl = document.getElementById('networkType');
            const wifiSSIDEl = document.getElementById('wifiSSID');
            const carrierNameEl = document.getElementById('carrierName');
            const signalBarsEl = document.getElementById('signalBars');
            const badgeNetworkEl = document.getElementById('badgeNetwork');
            const btnTestEl = document.getElementById('btnTest');
            const lastUpdateEl = document.getElementById('lastUpdate');
            const statusDotEl = document.getElementById('statusDot');
            const statusTextEl = document.getElementById('statusText');

            // ============ CONFIGURAÇÃO DO CANVAS RESPONSIVO ============
            const BASE_SIZE = 400;
            let canvasScale = 1;

            function updateCanvasSize() {
                const wrapper = document.querySelector('.speedometer-wrapper');
                if (!wrapper) return;
                const wrapperWidth = wrapper.clientWidth;
                const displayWidth = Math.min(wrapperWidth, 400);
                canvasScale = displayWidth / BASE_SIZE;
                canvas.style.width = displayWidth + 'px';
                canvas.style.height = displayWidth + 'px';
                // O canvas interno mantém 400x400 para qualidade, mas escalamos o desenho
                canvas.width = BASE_SIZE;
                canvas.height = BASE_SIZE;
                drawSpeedometer(state.currentSpeed);
            }

            // ============ DESENHO DO VELOCÍMETRO (ESTILO CARRO COM PROFUNDIDADE) ============
            function drawSpeedometer(speed) {
                const w = BASE_SIZE;
                const h = BASE_SIZE;
                const centerX = w / 2;
                const centerY = h / 2;
                const radius = 158;

                ctx.clearRect(0, 0, w, h);

                // ---- ANEL EXTERNO COM SOMBRA 3D ----
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 35;
                ctx.shadowOffsetX = 8;
                ctx.shadowOffsetY = 8;

                const outerGrad = ctx.createRadialGradient(centerX - 20, centerY - 20, radius - 40, centerX, centerY,
                radius + 25);
                outerGrad.addColorStop(0, '#2c2c4a');
                outerGrad.addColorStop(0.5, '#1a1a32');
                outerGrad.addColorStop(1, '#0a0a18');

                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 22, 0, Math.PI * 2);
                ctx.fillStyle = outerGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 4;
                ctx.stroke();
                ctx.restore();

                // ---- ANEL CROMADO INTERMEDIÁRIO ----
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius + 12, 0, Math.PI * 2);
                const chromeGrad = ctx.createLinearGradient(centerX - radius, centerY - radius, centerX + radius, centerY +
                    radius);
                chromeGrad.addColorStop(0, '#4a4a68');
                chromeGrad.addColorStop(0.3, '#8888aa');
                chromeGrad.addColorStop(0.5, '#cccce0');
                chromeGrad.addColorStop(0.7, '#666688');
                chromeGrad.addColorStop(1, '#2a2a44');
                ctx.fillStyle = chromeGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();

                // ---- FUNDO PRETO DO PAINEL ----
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                const bgGrad = ctx.createRadialGradient(centerX - 10, centerY - 10, radius * 0.2, centerX, centerY, radius);
                bgGrad.addColorStop(0, '#1e1e38');
                bgGrad.addColorStop(0.7, '#0c0c1e');
                bgGrad.addColorStop(1, '#050510');
                ctx.fillStyle = bgGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                ctx.lineWidth = 5;
                ctx.stroke();
                ctx.restore();

                // ---- ANEL INTERNO COM RANHURAS ----
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 6, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255,255,255,0.06)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 15]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                const startAngle = Math.PI * 0.68;
                const endAngle = Math.PI * 2.32;
                const totalAngle = endAngle - startAngle;
                const maxSpeed = 600;

                // ---- MARCAÇÕES E NÚMEROS (0 a 600, passo 50) ----
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.6)';
                ctx.shadowBlur = 4;

                for (let i = 0; i <= maxSpeed; i += 10) {
                    const angle = startAngle + (i / maxSpeed) * totalAngle;
                    const isMajor = i % 50 === 0;
                    const isMedium = i % 25 === 0 && !isMajor;
                    const innerR = radius - (isMajor ? 32 : isMedium ? 26 : 20);
                    const outerR = radius - 6;

                    const x1 = centerX + Math.cos(angle) * innerR;
                    const y1 = centerY + Math.sin(angle) * innerR;
                    const x2 = centerX + Math.cos(angle) * outerR;
                    const y2 = centerY + Math.sin(angle) * outerR;

                    ctx.beginPath();
                    ctx.moveTo(x1, y1);
                    ctx.lineTo(x2, y2);

                    // Cores por faixa
                    if (i <= 150) {
                        ctx.strokeStyle = '#2ed573';
                    } else if (i <= 350) {
                        ctx.strokeStyle = '#ffa502';
                    } else if (i <= 500) {
                        ctx.strokeStyle = '#ff6b81';
                    } else {
                        ctx.strokeStyle = '#ff4757';
                    }

                    ctx.lineWidth = isMajor ? 3.5 : isMedium ? 2 : 1;
                    ctx.shadowColor = isMajor ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.3)';
                    ctx.shadowBlur = isMajor ? 6 : 2;
                    ctx.stroke();

                    // Números a cada 50
                    if (isMajor) {
                        const numRadius = radius - 54;
                        const nx = centerX + Math.cos(angle) * numRadius;
                        const ny = centerY + Math.sin(angle) * numRadius;

                        ctx.font = 'bold 13px "Inter", -apple-system, sans-serif';
                        ctx.fillStyle = '#ffffff';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.shadowColor = 'rgba(77,124,255,0.7)';
                        ctx.shadowBlur = 8;
                        ctx.fillText(i.toString(), nx, ny);
                        ctx.shadowBlur = 0;
                    }
                }
                ctx.restore();

                // ---- TEXTO CENTRAL "Mbps" ----
                ctx.save();
                ctx.font = 'bold 13px "Inter", -apple-system, sans-serif';
                ctx.fillStyle = '#8899cc';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.shadowColor = 'rgba(77,124,255,0.4)';
                ctx.shadowBlur = 6;
                ctx.fillText('Mbps', centerX, centerY + 38);
                ctx.restore();

                // ---- ARCO DE VELOCIDADE ATUAL COM GRADIENTE ----
                const activeAngle = startAngle + (Math.min(Math.max(speed, 0), maxSpeed) / maxSpeed) * totalAngle;

                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 3, startAngle, activeAngle);

                // Gradiente ao longo do arco
                const arcGrad = ctx.createLinearGradient(
                    centerX + Math.cos(startAngle) * radius,
                    centerY + Math.sin(startAngle) * radius,
                    centerX + Math.cos(endAngle) * radius,
                    centerY + Math.sin(endAngle) * radius
                );
                arcGrad.addColorStop(0, '#2ed573');
                arcGrad.addColorStop(0.3, '#ffa502');
                arcGrad.addColorStop(0.65, '#ff6b81');
                arcGrad.addColorStop(1, '#ff4757');

                ctx.strokeStyle = arcGrad;
                ctx.lineWidth = 14;
                ctx.shadowColor = 'rgba(255,100,100,0.7)';
                ctx.shadowBlur = 25;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.restore();

                // ---- EFEITO DE BRILHO NO ARCO ----
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 3, startAngle, activeAngle);
                ctx.strokeStyle = 'rgba(255,255,255,0.25)';
                ctx.lineWidth = 4;
                ctx.shadowColor = 'rgba(255,255,255,0.4)';
                ctx.shadowBlur = 12;
                ctx.lineCap = 'round';
                ctx.stroke();
                ctx.restore();

                // ---- PONTEIRO (ESTILO CARRO ESPORTIVO) ----
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(activeAngle);

                // Sombra do ponteiro
                ctx.shadowColor = 'rgba(0,0,0,0.7)';
                ctx.shadowBlur = 18;
                ctx.shadowOffsetX = 3;
                ctx.shadowOffsetY = 3;

                // Ponteiro principal (agulha)
                ctx.beginPath();
                ctx.moveTo(0, -6);
                ctx.lineTo(radius - 38, 0);
                ctx.lineTo(0, 6);
                ctx.closePath();
                const needleGrad = ctx.createLinearGradient(0, -6, 0, 6);
                needleGrad.addColorStop(0, '#ff6b6b');
                needleGrad.addColorStop(0.5, '#ff4444');
                needleGrad.addColorStop(1, '#cc2222');
                ctx.fillStyle = needleGrad;
                ctx.fill();

                // Listra central do ponteiro
                ctx.beginPath();
                ctx.moveTo(0, -1.5);
                ctx.lineTo(radius - 42, 0);
                ctx.lineTo(0, 1.5);
                ctx.closePath();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.fill();

                ctx.restore();

                // ---- CENTRO DO PONTEIRO (EIXO) ----
                ctx.save();
                ctx.shadowColor = 'rgba(0,0,0,0.8)';
                ctx.shadowBlur = 12;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                ctx.beginPath();
                ctx.arc(centerX, centerY, 12, 0, Math.PI * 2);
                const hubGrad = ctx.createRadialGradient(centerX - 3, centerY - 3, 2, centerX, centerY, 12);
                hubGrad.addColorStop(0, '#ddd');
                hubGrad.addColorStop(0.5, '#888');
                hubGrad.addColorStop(1, '#333');
                ctx.fillStyle = hubGrad;
                ctx.fill();
                ctx.strokeStyle = 'rgba(255,255,255,0.5)';
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.restore();

                // Parafuso central
                ctx.beginPath();
                ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a2e';
                ctx.fill();
                ctx.strokeStyle = '#ff4444';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                // Ponto luminoso central
                ctx.beginPath();
                ctx.arc(centerX, centerY, 2.5, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6666';
                ctx.fill();
                ctx.shadowColor = 'rgba(255,100,100,0.9)';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0;

                // ---- REFLEXO DE VIDRO (LUZ) ----
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX - 45, centerY - 45, radius - 50, Math.PI * 0.65, Math.PI * 1.5);
                ctx.strokeStyle = 'rgba(255,255,255,0.08)';
                ctx.lineWidth = 18;
                ctx.stroke();
                ctx.restore();

                // Pequeno reflexo superior
                ctx.save();
                ctx.beginPath();
                ctx.arc(centerX - 30, centerY - 55, radius - 80, Math.PI * 0.7, Math.PI * 1.1);
                ctx.strokeStyle = 'rgba(255,255,255,0.12)';
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.restore();
            }

            // ============ ANIMAÇÃO DO PONTEIRO ============
            function animateSpeed() {
                const diff = state.targetSpeed - state.currentSpeed;
                if (Math.abs(diff) > 0.05) {
                    // Suavização com easing
                    const step = diff * 0.18;
                    state.currentSpeed += step;
                    speedValueEl.textContent = Math.round(state.currentSpeed);
                    drawSpeedometer(state.currentSpeed);
                    state.animationId = requestAnimationFrame(animateSpeed);
                } else if (Math.abs(diff) > 0.001) {
                    state.currentSpeed = state.targetSpeed;
                    speedValueEl.textContent = Math.round(state.currentSpeed);
                    drawSpeedometer(state.currentSpeed);
                }
            }

            function setTargetSpeed(speed) {
                state.targetSpeed = Math.min(Math.max(speed, 0), 600);
                if (state.animationId) cancelAnimationFrame(state.animationId);
                state.animationId = requestAnimationFrame(animateSpeed);
            }

            // ============ DETECÇÃO DE REDE ============
            function detectNetworkInfo() {
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                let typeStr = '📶 Rede Desconhecida';
                let signalLevel = 3;
                let badgeText = '🌐 Real Time';

                if (connection) {
                    const effType = connection.effectiveType || '';
                    const type = connection.type || '';

                    if (type === 'wifi') {
                        typeStr = '📶 Wi-Fi';
                        badgeText = '📶 Wi-Fi';
                        signalLevel = 4;
                        // Estimar sinal pelo downlink
                        if (connection.downlink) {
                            if (connection.downlink > 50) signalLevel = 4;
                            else if (connection.downlink > 20) signalLevel = 3;
                            else if (connection.downlink > 5) signalLevel = 2;
                            else signalLevel = 1;
                        }
                    } else if (type === 'cellular') {
                        const effMap = { '4g': '4G/LTE', '5g': '5G', '3g': '3G', '2g': '2G', 'slow-2g': '2G' };
                        const effLabel = effMap[effType] || effType.toUpperCase();
                        typeStr = '📱 ' + effLabel;
                        badgeText = '📱 Rede Móvel';
                        signalLevel = effType === '5g' ? 4 : effType === '4g' ? 3 : effType === '3g' ? 2 : 1;
                        // Tentar inferir operadora (não disponível via JS puro, mas podemos receber do Kodular)
                    } else if (type === 'ethernet') {
                        typeStr = '🔌 Ethernet';
                        badgeText = '🔌 Cabo';
                        signalLevel = 4;
                    } else if (effType) {
                        typeStr = '📶 ' + effType.toUpperCase();
                        badgeText = '📶 ' + effType.toUpperCase();
                    }

                    // Atualizar barras de sinal
                    updateSignalBars(signalLevel);
                } else {
                    // Fallback: inferir por downlink estimado
                    typeStr = '📶 Rede Ativa';
                    badgeText = '🌐 Online';
                    updateSignalBars(3);
                }

                state.networkTypeStr = typeStr;
                state.signalLevel = signalLevel;
                networkTypeEl.textContent = typeStr;
                badgeNetworkEl.textContent = badgeText;
            }

            function updateSignalBars(level) {
                const bars = signalBarsEl.querySelectorAll('.signal-bar');
                const heights = [6, 10, 14, 18];
                const activeColor = level >= 3 ? '#2ed573' : level >= 2 ? '#ffa502' : '#ff4757';
                const inactiveColor = 'rgba(255,255,255,0.15)';

                bars.forEach((bar, i) => {
                    if (i < level) {
                        bar.style.height = heights[i] + 'px';
                        bar.style.background = 'linear-gradient(180deg, ' + activeColor + ' 0%, #4d7cff 100%)';
                        bar.style.boxShadow = '0 0 10px ' + activeColor;
                        bar.style.opacity = '1';
                    } else {
                        bar.style.height = heights[i] + 'px';
                        bar.style.background = inactiveColor;
                        bar.style.boxShadow = 'none';
                        bar.style.opacity = '0.4';
                    }
                });
            }

            // ============ FUNÇÕES PARA RECEBER DADOS EXTERNOS (KODULAR) ============
            function updateSSID(ssid) {
                if (ssid && ssid.trim() !== '') {
                    state.wifiSSID = ssid.trim();
                    wifiSSIDEl.textContent = state.wifiSSID;
                    wifiSSIDEl.title = 'SSID: ' + state.wifiSSID;
                } else {
                    state.wifiSSID = '—';
                    wifiSSIDEl.textContent = '—';
                }
            }

            function updateCarrier(carrier) {
                if (carrier && carrier.trim() !== '') {
                    state.carrierName = carrier.trim();
                    carrierNameEl.textContent = state.carrierName;
                    carrierNameEl.title = 'Operadora: ' + state.carrierName;
                } else {
                    state.carrierName = '—';
                    carrierNameEl.textContent = '—';
                }
            }

            // Expor funções globalmente para o Kodular
            window.setWifiSSID = updateSSID;
            window.setCarrierName = updateCarrier;
            window.updateNetworkInfo = function(ssid, carrier, type, signal) {
                if (ssid !== undefined) updateSSID(ssid);
                if (carrier !== undefined) updateCarrier(carrier);
                if (type !== undefined && type !== '') {
                    state.networkTypeStr = type;
                    networkTypeEl.textContent = type;
                }
                if (signal !== undefined && signal >= 0 && signal <= 4) {
                    state.signalLevel = signal;
                    updateSignalBars(signal);
                }
            };

            // ============ TESTE DE VELOCIDADE REAL ============
            async function startSpeedTest() {
                if (state.isTestRunning) return;
                state.isTestRunning = true;
                btnTestEl.textContent = '⏳ Preparando...';
                btnTestEl.style.opacity = '0.8';
                statusDotEl.style.background = '#ffa502';
                statusDotEl.style.boxShadow = '0 0 12px rgba(255,165,2,0.7)';
                statusTextEl.textContent = 'Testando...';

                detectNetworkInfo();

                // 1. Medir latência (ping) com 4 tentativas
                btnTestEl.textContent = '⏱️ Ping...';
                let totalPing = 0;
                const pingTests = 4;
                const pingUrls = [
                    'https://www.google.com/favicon.ico',
                    'https://www.cloudflare.com/favicon.ico',
                    'https://www.microsoft.com/favicon.ico',
                    'https://www.github.com/favicon.ico',
                ];

                for (let i = 0; i < pingTests; i++) {
                    const pingStart = performance.now();
                    try {
                        await fetch(pingUrls[i] || pingUrls[0], { mode: 'no-cors', cache: 'no-store' });
                        totalPing += performance.now() - pingStart;
                    } catch (e) {
                        totalPing += 30 + Math.random() * 15;
                    }
                }
                state.latency = Math.round(totalPing / pingTests);
                latencyEl.textContent = state.latency;

                // 2. Medir download com múltiplas fontes
                btnTestEl.textContent = '📥 Download...';
                const downloadUrls = [
                    { url: 'https://speed.cloudflare.com/__down?bytes=8000000', size: 8000000 },
                    { url: 'https://speed.cloudflare.com/__down?bytes=15000000', size: 15000000 },
                    { url: 'https://httpbin.org/bytes/8000000', size: 8000000 },
                ];

                let bestDownloadSpeed = 0;
                let totalDownloadSpeed = 0;
                let successfulDownloads = 0;

                for (const dl of downloadUrls) {
                    try {
                        const startTime = performance.now();
                        const response = await fetch(dl.url, { cache: 'no-store' });
                        const reader = response.body.getReader();
                        let loaded = 0;

                        const progressInterval = setInterval(() => {
                            const duration = (performance.now() - startTime) / 1000;
                            if (duration > 0.1) {
                                const currentMbps = Math.round(((loaded * 8) / (1024 * 1024)) / duration);
                                setTargetSpeed(currentMbps);
                            }
                        }, 80);

                        while (true) {
                            const { done, value } = await reader.read();
                            if (done) break;
                            loaded += value.length;
                        }

                        clearInterval(progressInterval);
                        const totalDuration = (performance.now() - startTime) / 1000;
                        if (totalDuration > 0.1) {
                            const speed = Math.round(((loaded * 8) / (1024 * 1024)) / totalDuration);
                            totalDownloadSpeed += speed;
                            successfulDownloads++;
                            if (speed > bestDownloadSpeed) bestDownloadSpeed = speed;
                        }
                    } catch (error) {
                        continue;
                    }
                }

                if (successfulDownloads > 0) {
                    state.downloadSpeed = Math.round(totalDownloadSpeed / successfulDownloads);
                    if (bestDownloadSpeed > state.downloadSpeed && bestDownloadSpeed < state.downloadSpeed * 1.5) {
                        state.downloadSpeed = Math.round((state.downloadSpeed + bestDownloadSpeed) / 2);
                    }
                } else {
                    // Fallback estimado
                    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                    if (connection && connection.downlink) {
                        state.downloadSpeed = Math.round(connection.downlink * 0.85);
                    } else {
                        state.downloadSpeed = Math.round(40 + Math.random() * 50);
                    }
                }

                setTargetSpeed(state.downloadSpeed);
                downloadSpeedEl.textContent = state.downloadSpeed;
                if (state.downloadSpeed > state.peakSpeed) {
                    state.peakSpeed = state.downloadSpeed;
                    peakSpeedEl.textContent = state.peakSpeed;
                }

                // 3. Medir upload (CORRIGIDO com endpoint apropriado)
                btnTestEl.textContent = '📤 Upload...';
                const uploadDataSizes = [500000, 1000000, 2000000]; // 500KB, 1MB, 2MB
                let totalUploadSpeed = 0;
                let successfulUploads = 0;

                for (const dataSize of uploadDataSizes) {
                    try {
                        const uploadData = new Uint8Array(dataSize);
                        // Preencher com dados aleatórios para evitar compressão
                        for (let i = 0; i < dataSize; i++) uploadData[i] = Math.floor(Math.random() * 256);
                        const startTime = performance.now();
                        await fetch('https://speed.cloudflare.com/__up', {
                            method: 'POST',
                            body: uploadData.buffer,
                            cache: 'no-store',
                            headers: { 'Content-Type': 'application/octet-stream' },
                        });
                        const uploadDuration = (performance.now() - startTime) / 1000;
                        if (uploadDuration > 0.05) {
                            const speed = Math.round(((dataSize * 8) / (1024 * 1024)) / uploadDuration);
                            totalUploadSpeed += speed;
                            successfulUploads++;
                        }
                    } catch (error) {
                        continue;
                    }
                }

                if (successfulUploads > 0) {
                    state.uploadSpeed = Math.round(totalUploadSpeed / successfulUploads);
                } else {
                    const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                    if (connection && connection.downlink) {
                        state.uploadSpeed = Math.round(connection.downlink * 0.35);
                    } else {
                        state.uploadSpeed = Math.round(state.downloadSpeed * 0.3);
                    }
                }
                uploadSpeedEl.textContent = state.uploadSpeed;

                // Finalizar
                state.isTestRunning = false;
                btnTestEl.textContent = '🚀 Testar Velocidade';
                btnTestEl.style.opacity = '1';
                statusDotEl.style.background = '#2ed573';
                statusDotEl.style.boxShadow = '0 0 12px rgba(46,213,115,0.7)';
                statusTextEl.textContent = 'Conectado';
                lastUpdateEl.textContent = 'Último: ' + new Date().toLocaleTimeString('pt-BR');
                detectNetworkInfo();

                // Enviar dados para o Kodular (formato original)
                if (window.AppInventor && typeof window.AppInventor.setWebViewString === 'function') {
                    const dadosFinais = String(state.downloadSpeed).trim() + '|' +
                        String(state.uploadSpeed).trim() + '|' +
                        String(state.latency).trim();
                    window.AppInventor.setWebViewString(dadosFinais);
                }

                // Também disparar um evento customizado para possíveis listeners
                window.dispatchEvent(new CustomEvent('speedTestComplete', {
                    detail: {
                        download: state.downloadSpeed,
                        upload: state.uploadSpeed,
                        latency: state.latency,
                        peak: state.peakSpeed,
                        wifiSSID: state.wifiSSID,
                        carrier: state.carrierName,
                        networkType: state.networkTypeStr,
                    }
                }));
            }

            function resetData() {
                state.targetSpeed = 0;
                state.downloadSpeed = 0;
                state.uploadSpeed = 0;
                state.latency = 0;
                state.peakSpeed = 0;
                setTargetSpeed(0);
                downloadSpeedEl.textContent = '0';
                uploadSpeedEl.textContent = '0';
                latencyEl.textContent = '0';
                peakSpeedEl.textContent = '0';
                lastUpdateEl.textContent = 'Último teste: --:--';
                detectNetworkInfo();
                statusDotEl.style.background = '#2ed573';
                statusDotEl.style.boxShadow = '0 0 12px rgba(46,213,115,0.7)';
                statusTextEl.textContent = 'Pronto';
            }

            // ============ INICIALIZAÇÃO ============
            function init() {
                updateCanvasSize();
                detectNetworkInfo();
                drawSpeedometer(0);
                speedValueEl.textContent = '0';

                // Tentar obter SSID e operadora se disponíveis via Kodular
                if (window.AppInventor) {
                    // O Kodular pode injetar essas variáveis antes do carregamento
                    if (typeof window.initialSSID !== 'undefined') updateSSID(window.initialSSID);
                    if (typeof window.initialCarrier !== 'undefined') updateCarrier(window.initialCarrier);
                }

                // Atualizar canvas ao redimensionar
                window.addEventListener('resize', () => {
                    updateCanvasSize();
                });

                // Observer para detectar mudanças no container
                if (window.ResizeObserver) {
                    const wrapper = document.querySelector('.speedometer-wrapper');
                    if (wrapper) {
                        new ResizeObserver(() => {
                            updateCanvasSize();
                        }).observe(wrapper);
                    }
                }

                // Atualizar info de rede periodicamente
                setInterval(detectNetworkInfo, 15000);

                // Expor função de teste globalmente
                window.startSpeedTest = startSpeedTest;
                window.resetData = resetData;
            }

            // Iniciar quando o DOM estiver pronto
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
