<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetSpeed Pro | Internet Velocimeter</title>
    
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #3498db;
            --accent-light: #5dade2;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --border: #e1e8ed;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .app-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .provider-badge {
            background: #f0f4ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            border: 1px solid #d1d9ff;
            transition: all 0.3s;
        }

        .speedometer-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 24px;
            aspect-ratio: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .speed-digital {
            text-align: center;
            margin-bottom: 20px;
        }

        .speed-value {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
            transition: color 0.3s;
        }

        .speed-unit {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 11px;
            margin-top: 2px;
        }

        .positive { color: var(--success); }
        .negative { color: var(--danger); }

        .network-indicator {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s;
        }

        .network-type {
            font-weight: 600;
            font-size: 14px;
            color: #166534;
        }

        .network-signal {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }

        .signal-bar {
            width: 3px;
            background: #22c55e;
            border-radius: 2px;
            transition: height 0.3s, background 0.3s;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
            text-align: center;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-outline {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .status-dot.offline {
            background: var(--danger);
            animation: none;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .progress-text {
            text-align: center;
            font-size: 13px;
            color: var(--accent);
            margin-top: 8px;
            font-weight: 500;
            display: none;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a2e;
                --bg-secondary: #16213e;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0a0;
                --border: #2a2a4a;
            }
            body { background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); }
            .stat-card { background: #1e2a4a; }
            .btn-outline { background: #16213e; color: #e0e0e0; }
            .network-indicator { background: #1a2e1a; border-color: #2a4a2a; }
            .network-type { color: #4ade80; }
            .provider-badge { background: #1e2a4a; border-color: #2a3a6a; color: #a5b4fc; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div>
                <div class="app-title">NetSpeed Pro</div>
                <div class="app-subtitle">Internet Velocimeter</div>
            </div>
            <div class="provider-badge" id="providerBadge">🌐 Fiber</div>
        </div>

        <div class="speedometer-wrapper">
            <canvas id="speedometer" width="380" height="380"></canvas>
        </div>

        <div class="speed-digital">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">Megabits por segundo</div>
            <div class="progress-text" id="progressText">Analisando...</div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📊 Download</div>
                <div class="stat-value" id="downloadSpeed">0</div>
                <div class="stat-change positive">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📤 Upload</div>
                <div class="stat-value" id="uploadSpeed">0</div>
                <div class="stat-change">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 Pico</div>
                <div class="stat-value" id="peakSpeed">0</div>
                <div class="stat-change">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ Latência</div>
                <div class="stat-value" id="latency">0</div>
                <div class="stat-change negative">ms</div>
            </div>
        </div>

        <div class="network-indicator" id="networkIndicator">
            <div class="network-type" id="networkType">📱 Carregando...</div>
            <div class="network-signal" id="signalBars"></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" id="btnTest" onclick="startSpeedTest()">🚀 Testar Velocidade</button>
            <button class="btn btn-outline" id="btnReset" onclick="resetData()">🔄 Resetar</button>
        </div>

        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Conectado</span>
            </div>
            <div class="timestamp" id="lastUpdate">Último teste: --:--</div>
        </div>
    </div>

    <script>
        (function() {
            // Estado da aplicação
            const state = {
                currentSpeed: 0,
                downloadSpeed: 0,
                uploadSpeed: 0,
                peakSpeed: 0,
                latency: 0,
                targetSpeed: 0,
                isTestRunning: false,
                testInterval: null,
                animationFrame: null,
                networkType: 'unknown'
            };

            // Elementos do DOM
            const canvas = document.getElementById('speedometer');
            const ctx = canvas.getContext('2d');
            const speedValue = document.getElementById('speedValue');
            const downloadSpeed = document.getElementById('downloadSpeed');
            const uploadSpeed = document.getElementById('uploadSpeed');
            const peakSpeed = document.getElementById('peakSpeed');
            const latency = document.getElementById('latency');
            const btnTest = document.getElementById('btnTest');
            const btnReset = document.getElementById('btnReset');
            const progressText = document.getElementById('progressText');
            const networkType = document.getElementById('networkType');
            const signalBars = document.getElementById('signalBars');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const providerBadge = document.getElementById('providerBadge');
            const lastUpdate = document.getElementById('lastUpdate');

            // Constantes do velocímetro
            const MAX_SPEED = 800;
            const CENTER_X = 190;
            const CENTER_Y = 190;
            const RADIUS = 145;
            const START_ANGLE = Math.PI * 0.7;
            const END_ANGLE = Math.PI * 2.3;
            const TOTAL_ANGLE = END_ANGLE - START_ANGLE;

            function drawSpeedometer(speed) {
                ctx.clearRect(0, 0, 380, 380);
                
                // Arco de fundo
                ctx.beginPath();
                ctx.arc(CENTER_X, CENTER_Y, RADIUS, START_ANGLE, END_ANGLE);
                ctx.strokeStyle = '#e2e8f0';
                ctx.lineWidth = 12;
                ctx.stroke();

                // Arco ativo
                const clampedSpeed = Math.min(speed, MAX_SPEED);
                const activeAngle = START_ANGLE + (clampedSpeed / MAX_SPEED) * TOTAL_ANGLE;
                
                // Gradiente de cor baseado na velocidade
                let color;
                if (clampedSpeed < 200) color = '#3b82f6';
                else if (clampedSpeed < 500) color = '#8b5cf6';
                else color = '#ef4444';
                
                ctx.beginPath();
                ctx.arc(CENTER_X, CENTER_Y, RADIUS, START_ANGLE, activeAngle);
                ctx.strokeStyle = color;
                ctx.stroke();

                // Ponteiro
                ctx.save();
                ctx.translate(CENTER_X, CENTER_Y);
                ctx.rotate(activeAngle);
                ctx.beginPath();
                ctx.moveTo(0, -4);
                ctx.lineTo(RADIUS - 20, 0);
                ctx.lineTo(0, 4);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
                ctx.restore();

                // Centro
                ctx.beginPath();
                ctx.arc(CENTER_X, CENTER_Y, 8, 0, Math.PI * 2);
                ctx.fillStyle = '#1e293b';
                ctx.fill();
            }

            function animateSpeed() {
                const diff = state.targetSpeed - state.currentSpeed;
                if (Math.abs(diff) > 0.5) {
                    state.currentSpeed += diff * 0.12;
                    speedValue.textContent = Math.round(state.currentSpeed);
                    drawSpeedometer(state.currentSpeed);
                    state.animationFrame = requestAnimationFrame(animateSpeed);
                } else {
                    state.currentSpeed = state.targetSpeed;
                    speedValue.textContent = Math.round(state.currentSpeed);
                    drawSpeedometer(state.currentSpeed);
                    state.animationFrame = null;
                }
            }

            function stopAnimation() {
                if (state.animationFrame) {
                    cancelAnimationFrame(state.animationFrame);
                    state.animationFrame = null;
                }
            }

            function stopTest() {
                if (state.testInterval) {
                    clearInterval(state.testInterval);
                    state.testInterval = null;
                }
                state.isTestRunning = false;
                btnTest.textContent = '🚀 Testar Velocidade';
                btnTest.disabled = false;
                progressText.style.display = 'none';
            }

            function startSpeedTest() {
                if (state.isTestRunning) return;
                
                // Para qualquer teste ou animação anterior
                stopTest();
                stopAnimation();
                
                state.isTestRunning = true;
                btnTest.textContent = '⏳ Analisando...';
                btnTest.disabled = true;
                progressText.style.display = 'block';
                
                let progress = 0;
                const testDuration = 3000; // 3 segundos
                const steps = 30;
                const stepTime = testDuration / steps;
                let step = 0;
                
                // Simulação mais realista com aceleração gradual
                state.testInterval = setInterval(() => {
                    if (!state.isTestRunning) {
                        // Se o teste foi interrompido pelo reset
                        clearInterval(state.testInterval);
                        state.testInterval = null;
                        return;
                    }
                    
                    step++;
                    if (step >= steps) {
                        // Teste concluído
                        clearInterval(state.testInterval);
                        state.testInterval = null;
                        
                        // Resultados finais simulados
                        const base = 400 + Math.random() * 300;
                        const finalD = Math.round(base);
                        const finalU = Math.round(base * (0.4 + Math.random() * 0.3));
                        const finalP = Math.round(5 + Math.random() * 20);
                        
                        state.targetSpeed = finalD;
                        state.downloadSpeed = finalD;
                        state.uploadSpeed = finalU;
                        state.latency = finalP;
                        
                        if (finalD > state.peakSpeed) {
                            state.peakSpeed = finalD;
                        }
                        
                        // Atualiza interface
                        downloadSpeed.textContent = finalD;
                        uploadSpeed.textContent = finalU;
                        latency.textContent = finalP;
                        peakSpeed.textContent = state.peakSpeed;
                        lastUpdate.textContent = 'Último: ' + new Date().toLocaleTimeString();
                        
                        // Envia para AppInventor (se disponível)
                        if (window.AppInventor && typeof window.AppInventor.setWebViewString === 'function') {
                            const dadosFinais = String(finalD).trim() + "|" + String(finalU).trim() + "|" + String(finalP).trim();
                            try {
                                window.AppInventor.setWebViewString(dadosFinais);
                            } catch(e) {
                                console.log('AppInventor not available');
                            }
                        }
                        
                        // Finaliza
                        state.isTestRunning = false;
                        btnTest.textContent = '🚀 Testar Velocidade';
                        btnTest.disabled = false;
                        progressText.style.display = 'none';
                        
                        // Inicia animação final
                        if (!state.animationFrame) {
                            animateSpeed();
                        }
                    } else {
                        // Progresso não-linear para simulação realista
                        const progressRatio = step / steps;
                        // Curva de aceleração: começa rápido, depois estabiliza
                        const simulatedSpeed = MAX_SPEED * (1 - Math.exp(-5 * progressRatio)) + (Math.random() * 30);
                        state.targetSpeed = Math.min(simulatedSpeed, MAX_SPEED);
                        
                        if (!state.animationFrame) {
                            animateSpeed();
                        }
                        
                        // Atualiza valores parciais nos cards
                        downloadSpeed.textContent = Math.round(simulatedSpeed);
                        uploadSpeed.textContent = Math.round(simulatedSpeed * 0.6);
                        latency.textContent = Math.round(8 + Math.random() * 10);
                    }
                }, stepTime);
            }

            function resetData() {
                // Para tudo
                stopTest();
                stopAnimation();
                
                // Reseta valores
                state.currentSpeed = 0;
                state.targetSpeed = 0;
                state.downloadSpeed = 0;
                state.uploadSpeed = 0;
                state.latency = 0;
                
                // Atualiza interface
                speedValue.textContent = '0';
                downloadSpeed.textContent = '0';
                uploadSpeed.textContent = '0';
                latency.textContent = '0';
                // Mantém o pico histórico, mas pode resetar se desejar
                // state.peakSpeed = 0;
                // peakSpeed.textContent = '0';
                drawSpeedometer(0);
                progressText.style.display = 'none';
                btnTest.disabled = false;
            }

            // Função para detectar e atualizar informações de rede
            function updateNetworkInfo() {
                const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                let type = 'Desconhecida';
                let signalStrength = 0;
                let isOnline = navigator.onLine;
                
                if (connection) {
                    // Tipo de conexão
                    const effectiveType = connection.effectiveType || connection.type;
                    if (effectiveType) {
                        switch(effectiveType) {
                            case 'wifi': type = '📶 Wi-Fi'; break;
                            case 'ethernet': type = '🔌 Ethernet'; break;
                            case '4g': type = '📱 4G/LTE'; break;
                            case '5g': type = '📱 5G'; break;
                            case '3g': type = '📱 3G'; break;
                            case '2g': type = '📱 2G'; break;
                            case 'cellular': type = '📱 Dados Móveis'; break;
                            default: type = '🌐 ' + effectiveType.toUpperCase();
                        }
                    }
                    
                    // Força do sinal (para cellular)
                    if (connection.downlink) {
                        signalStrength = Math.min(Math.round(connection.downlink / 2), 5);
                    }
                    if (connection.type === 'wifi' || connection.type === 'ethernet') {
                        signalStrength = 5; // Força máxima para wifi/ethernet
                    }
                } else {
                    // Fallback: navegador não suporta API Network Information
                    type = isOnline ? '🌐 Conectado' : '❌ Offline';
                    signalStrength = isOnline ? 4 : 0;
                }
                
                if (!isOnline) {
                    type = '❌ Sem conexão';
                    signalStrength = 0;
                }
                
                // Atualiza UI
                networkType.textContent = type;
                providerBadge.textContent = isOnline ? (connection?.type === 'wifi' ? '📶 Wi-Fi' : '📱 Dados') : '❌ Offline';
                
                // Atualiza barras de sinal
                let barsHtml = '';
                const maxBars = 5;
                for (let i = 0; i < maxBars; i++) {
                    const active = i < signalStrength;
                    const height = 6 + (i * 4);
                    barsHtml += `<div class="signal-bar" style="height:${height}px; background:${active ? (signalStrength > 3 ? '#22c55e' : signalStrength > 1 ? '#f59e0b' : '#ef4444') : '#d1d5db'};"></div>`;
                }
                signalBars.innerHTML = barsHtml;
                
                // Status dot
                if (isOnline) {
                    statusDot.className = 'status-dot';
                    statusText.textContent = 'Conectado';
                } else {
                    statusDot.className = 'status-dot offline';
                    statusText.textContent = 'Offline';
                }
                
                // Atualiza cor do indicador de rede
                const networkIndicator = document.getElementById('networkIndicator');
                if (isOnline) {
                    networkIndicator.style.background = '#f0fdf4';
                    networkIndicator.style.borderColor = '#bbf7d0';
                } else {
                    networkIndicator.style.background = '#fef2f2';
                    networkIndicator.style.borderColor = '#fecaca';
                }
            }

            // Event listeners para mudanças de rede
            window.addEventListener('online', () => {
                updateNetworkInfo();
                if (state.isTestRunning) {
                    // Se estava offline e voltou, não retoma automaticamente, mas libera o botão
                    stopTest();
                }
            });
            
            window.addEventListener('offline', () => {
                updateNetworkInfo();
                if (state.isTestRunning) {
                    stopTest();
                }
            });
            
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                connection.addEventListener('change', updateNetworkInfo);
                connection.addEventListener('typechange', updateNetworkInfo);
            }

            // Inicialização
            function init() {
                drawSpeedometer(0);
                updateNetworkInfo();
                // Tenta carregar pico do armazenamento local se existir
                try {
                    const savedPeak = localStorage.getItem('netspeed_peak');
                    if (savedPeak && !isNaN(parseInt(savedPeak))) {
                        state.peakSpeed = parseInt(savedPeak);
                        peakSpeed.textContent = state.peakSpeed;
                    }
                } catch(e) {}
            }

            // Salva o pico quando atualizado
            const originalPeakSetter = Object.getOwnPropertyDescriptor(state, 'peakSpeed');
            Object.defineProperty(state, 'peakSpeed', {
                get: function() { return this._peakSpeed || 0; },
                set: function(val) {
                    this._peakSpeed = val;
                    try {
                        localStorage.setItem('netspeed_peak', val);
                    } catch(e) {}
                },
                configurable: true
            });
            state.peakSpeed = state.peakSpeed || 0; // Inicializa com getter/setter

            // Expõe funções necessárias globalmente
            window.startSpeedTest = startSpeedTest;
            window.resetData = resetData;
            
            init();
        })();
    </script>
</body>
</html>
