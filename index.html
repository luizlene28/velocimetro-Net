<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NetSpeed Pro | Internet Velocimeter</title>
    
    <style>
        :root {
            --bg-primary: #f8f9fa;
            --bg-secondary: #ffffff;
            --text-primary: #2c3e50;
            --text-secondary: #7f8c8d;
            --accent: #3498db;
            --accent-light: #5dade2;
            --danger: #e74c3c;
            --warning: #f39c12;
            --success: #27ae60;
            --border: #e1e8ed;
            --shadow: 0 2px 10px rgba(0,0,0,0.08);
            --shadow-lg: 0 10px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* Container Principal */
        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--bg-secondary);
            border-radius: 32px;
            padding: 24px 20px;
            box-shadow: var(--shadow-lg);
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .app-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }

        .app-subtitle {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .provider-badge {
            background: #f0f4ff;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: #667eea;
            border: 1px solid #d1d9ff;
        }

        /* Velocímetro Container */
        .speedometer-wrapper {
            position: relative;
            width: 100%;
            max-width: 340px;
            margin: 0 auto 24px;
            aspect-ratio: 1;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Speed Display */
        .speed-digital {
            text-align: center;
            margin-bottom: 20px;
        }

        .speed-value {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -2px;
            color: var(--text-primary);
            line-height: 1;
        }

        .speed-unit {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            margin-top: 4px;
            letter-spacing: 0.5px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 14px 12px;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .stat-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 11px;
            margin-top: 2px;
        }

        .positive {
            color: var(--success);
        }

        .negative {
            color: var(--danger);
        }

        /* Network Type */
        .network-indicator {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .network-type {
            font-weight: 600;
            font-size: 14px;
            color: #166534;
        }

        .network-signal {
            display: flex;
            gap: 2px;
            align-items: flex-end;
        }

        .signal-bar {
            width: 3px;
            background: #22c55e;
            border-radius: 2px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 80px;
            padding: 12px 16px;
            border-radius: 25px;
            border: none;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.2px;
            text-align: center;
        }

        .btn-primary {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            background: #5a6fd6;
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.4);
        }

        .btn-outline {
            background: white;
            color: var(--text-primary);
            border: 2px solid var(--border);
        }

        .btn-outline:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .btn:active {
            transform: scale(0.96);
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .timestamp {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Responsividade para Desktop */
        @media (min-width: 768px) {
            .app-container {
                max-width: 480px;
                padding: 32px 28px;
            }
            
            .stats-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .speed-value {
                font-size: 64px;
            }
            
            .btn {
                font-size: 14px;
                padding: 14px 20px;
            }
            
            .speedometer-wrapper {
                max-width: 380px;
            }
        }

        @media (max-width: 380px) {
            .app-container {
                padding: 20px 16px;
            }
            
            .speed-value {
                font-size: 48px;
            }
            
            .stat-value {
                font-size: 18px;
            }
            
            .btn {
                padding: 10px 12px;
                font-size: 12px;
            }
            
            .speedometer-wrapper {
                max-width: 280px;
            }
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-primary: #1a1a2e;
                --bg-secondary: #16213e;
                --text-primary: #e0e0e0;
                --text-secondary: #a0a0a0;
                --border: #2a2a4a;
            }
            
            body {
                background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            }
            
            .stat-card {
                background: #1e2a4a;
            }
            
            .stat-card:hover {
                background: #243356;
            }
            
            .btn-outline {
                background: #16213e;
                color: #e0e0e0;
            }
            
            .network-indicator {
                background: #1a2e1a;
                border-color: #2a4a2a;
            }
            
            .network-type {
                color: #4ade80;
            }
            
            .provider-badge {
                background: #1e1e3a;
                color: #818cf8;
                border-color: #2e2e5a;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div>
                <div class="app-title">NetSpeed Pro</div>
                <div class="app-subtitle">Internet Velocimeter</div>
            </div>
            <div class="provider-badge">🌐 Fiber</div>
        </div>

        <!-- Velocímetro -->
        <div class="speedometer-wrapper">
            <canvas id="speedometer" width="380" height="380"></canvas>
        </div>

        <!-- Velocidade Digital -->
        <div class="speed-digital">
            <div class="speed-value" id="speedValue">0</div>
            <div class="speed-unit">Megabits por segundo</div>
        </div>

        <!-- Grade de Estatísticas -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">📊 Download</div>
                <div class="stat-value" id="downloadSpeed">0</div>
                <div class="stat-change positive">↑ Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📤 Upload</div>
                <div class="stat-value" id="uploadSpeed">0</div>
                <div class="stat-change">↑ Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">📈 Pico</div>
                <div class="stat-value" id="peakSpeed">0</div>
                <div class="stat-change">Mbps</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">⏱️ Latência</div>
                <div class="stat-value" id="latency">0</div>
                <div class="stat-change negative">ms</div>
            </div>
        </div>

        <!-- Indicador de Rede -->
        <div class="network-indicator">
            <div class="network-type" id="networkType">📱 5G - Conectado</div>
            <div class="network-signal">
                <div class="signal-bar" style="height: 12px;"></div>
                <div class="signal-bar" style="height: 16px;"></div>
                <div class="signal-bar" style="height: 20px;"></div>
                <div class="signal-bar" style="height: 24px;"></div>
            </div>
        </div>

        <!-- Botões de Ação -->
        <div class="action-buttons">
            <button class="btn btn-primary" onclick="startSpeedTest()">
                🚀 Testar Velocidade
            </button>
            <button class="btn btn-outline" onclick="resetData()">
                🔄 Resetar
            </button>
            <button class="btn btn-outline" onclick="changeNetwork()">
                📡 Rede
            </button>
        </div>

        <!-- Barra de Status -->
        <div class="status-bar">
            <div class="connection-status">
                <div class="status-dot"></div>
                <span>Conectado</span>
            </div>
            <div class="timestamp" id="lastUpdate">Último teste: --:--</div>
        </div>
    </div>

    <script>
        // Estado da aplicação
        const state = {
            currentSpeed: 0,
            downloadSpeed: 0,
            uploadSpeed: 0,
            peakSpeed: 0,
            latency: 0,
            speedHistory: [],
            animationId: null,
            targetSpeed: 0,
            networkType: '5G',
            isTestRunning: false
        };

        // Elementos DOM
        const canvas = document.getElementById('speedometer');
        const ctx = canvas.getContext('2d');
        const speedValue = document.getElementById('speedValue');
        const downloadSpeed = document.getElementById('downloadSpeed');
        const uploadSpeed = document.getElementById('uploadSpeed');
        const peakSpeed = document.getElementById('peakSpeed');
        const latency = document.getElementById('latency');
        const networkType = document.getElementById('networkType');
        const lastUpdate = document.getElementById('lastUpdate');

        // Desenhar velocímetro com escala até 800 Mbps
        function drawSpeedometer(speed) {
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = Math.min(width, height) * 0.38;

            ctx.clearRect(0, 0, width, height);

            // Fundo do velocímetro
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 20, 0, Math.PI * 2);
            const bgGradient = ctx.createRadialGradient(centerX, centerY, radius * 0.5, centerX, centerY, radius + 20);
            bgGradient.addColorStop(0, '#ffffff');
            bgGradient.addColorStop(1, '#f1f5f9');
            ctx.fillStyle = bgGradient;
            ctx.fill();
            
            // Borda suave
            ctx.strokeStyle = '#e2e8f0';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Arco do velocímetro (0-800 Mbps em 240°)
            const startAngle = Math.PI * 0.7;
            const endAngle = Math.PI * 2.3;
            const totalAngle = endAngle - startAngle;
            const maxSpeed = 800;

            // Faixas de velocidade
            const zones = [
                { start: 0, end: 200, color: '#e2e8f0' },
                { start: 200, end: 400, color: '#bfdbfe' },
                { start: 400, end: 600, color: '#93c5fd' },
                { start: 600, end: 800, color: '#60a5fa' }
            ];

            zones.forEach(zone => {
                const zoneStart = startAngle + (zone.start / maxSpeed) * totalAngle;
                const zoneEnd = startAngle + (zone.end / maxSpeed) * totalAngle;
                
                ctx.beginPath();
                ctx.arc(centerX, centerY, radius - 10, zoneStart, zoneEnd);
                ctx.strokeStyle = zone.color;
                ctx.lineWidth = 12;
                ctx.stroke();
            });

            // Marcações e números
            for (let i = 0; i <= maxSpeed; i += 40) {
                const angle = startAngle + (i / maxSpeed) * totalAngle;
                const isMajor = i % 200 === 0;
                const isMedium = i % 100 === 0 && !isMajor;
                const isMinor = i % 40 === 0 && !isMajor && !isMedium;
                
                let tickLength;
                if (isMajor) tickLength = 22;
                else if (isMedium) tickLength = 16;
                else tickLength = 10;

                const x1 = centerX + Math.cos(angle) * (radius - tickLength);
                const y1 = centerY + Math.sin(angle) * (radius - tickLength);
                const x2 = centerX + Math.cos(angle) * radius;
                const y2 = centerY + Math.sin(angle) * radius;

                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.strokeStyle = isMajor ? '#1e293b' : isMedium ? '#64748b' : '#94a3b8';
                ctx.lineWidth = isMajor ? 2.5 : isMedium ? 1.8 : 1.2;
                ctx.stroke();

                // Números (apenas valores principais e médios)
                if (isMajor || isMedium) {
                    const numX = centerX + Math.cos(angle) * (radius - 34);
                    const numY = centerY + Math.sin(angle) * (radius - 34);
                    
                    ctx.fillStyle = isMajor ? '#1e293b' : '#475569';
                    ctx.font = isMajor ? '700 13px -apple-system, sans-serif' : '500 11px -apple-system, sans-serif';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(i.toString(), numX, numY);
                }
            }

            // Marca "Mbps" no centro inferior
            ctx.fillStyle = '#64748b';
            ctx.font = '500 10px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            const mbpsLabelX = centerX + Math.cos(startAngle + totalAngle/2) * (radius + 30);
            const mbpsLabelY = centerY + Math.sin(startAngle + totalAngle/2) * (radius + 30);
            ctx.fillText('Mbps', mbpsLabelX, mbpsLabelY);

            // Ponteiro
            const speedAngle = startAngle + (Math.min(speed, maxSpeed) / maxSpeed) * totalAngle;
            
            // Sombra do ponteiro
            ctx.shadowColor = 'rgba(0, 0, 0, 0.2)';
            ctx.shadowBlur = 10;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;

            // Ponteiro principal
            ctx.beginPath();
            ctx.moveTo(centerX, centerY);
            ctx.lineTo(
                centerX + Math.cos(speedAngle) * (radius - 45),
                centerY + Math.sin(speedAngle) * (radius - 45)
            );
            ctx.strokeStyle = '#3b82f6';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.stroke();

            // Reset shadow para o centro
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
            ctx.shadowOffsetX = 0;
            ctx.shadowOffsetY = 0;

            // Centro do ponteiro
            ctx.beginPath();
            ctx.arc(centerX, centerY, 10, 0, Math.PI * 2);
            const centerGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 10);
            centerGradient.addColorStop(0, '#ffffff');
            centerGradient.addColorStop(1, '#e2e8f0');
            ctx.fillStyle = centerGradient;
            ctx.fill();
            ctx.strokeStyle = '#cbd5e1';
            ctx.lineWidth = 2;
            ctx.stroke();

            // Ponto central
            ctx.beginPath();
            ctx.arc(centerX, centerY, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#3b82f6';
            ctx.fill();

            // Valor atual no centro
            ctx.fillStyle = '#1e293b';
            ctx.font = '700 16px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(Math.round(speed) + ' Mbps', centerX, centerY + 55);
        }

        // Animação suave
        function animateSpeed() {
            const diff = state.targetSpeed - state.currentSpeed;
            
            if (Math.abs(diff) > 0.1) {
                state.currentSpeed += diff * 0.1;
                updateDisplay(state.currentSpeed);
                state.animationId = requestAnimationFrame(animateSpeed);
            } else {
                state.currentSpeed = state.targetSpeed;
                updateDisplay(state.currentSpeed);
            }
        }

        // Atualizar display
        function updateDisplay(speed) {
            const roundedSpeed = Math.round(speed);
            speedValue.textContent = roundedSpeed;
            downloadSpeed.textContent = roundedSpeed;
            
            // Simular upload e latência
            const uploadVal = Math.round(speed * 0.4 + Math.random() * 5);
            uploadSpeed.textContent = uploadVal;
            
            latency.textContent = Math.round(15 + Math.random() * 25);
            
            drawSpeedometer(speed);
        }

        // Simular teste de velocidade
        function startSpeedTest() {
            if (state.isTestRunning) return;
            
            state.isTestRunning = true;
            const testButton = document.querySelector('.btn-primary');
            testButton.textContent = '⏳ Testando...';
            testButton.disabled = true;
            
            let progress = 0;
            const testInterval = setInterval(() => {
                progress += Math.random() * 80;
                
                if (progress >= 800) {
                    progress = 800;
                    clearInterval(testInterval);
                    state.targetSpeed = 600 + Math.random() * 200;
                    state.isTestRunning = false;
                    testButton.textContent = '🚀 Testar Velocidade';
                    testButton.disabled = false;
                    
                    if (state.targetSpeed > state.peakSpeed) {
                        state.peakSpeed = state.targetSpeed;
                        peakSpeed.textContent = Math.round(state.peakSpeed);
                    }
                    
                    lastUpdate.textContent = 'Último teste: ' + new Date().toLocaleTimeString();
                } else {
                    state.targetSpeed = progress;
                }
                
                animateSpeed();
            }, 100);
        }

        // Resetar dados
        function resetData() {
            state.targetSpeed = 0;
            state.peakSpeed = 0;
            state.downloadSpeed = 0;
            state.uploadSpeed = 0;
            state.latency = 0;
            state.speedHistory = [];
            
            peakSpeed.textContent = '0';
            lastUpdate.textContent = 'Último teste: --:--';
            
            animateSpeed();
        }

        // Mudar rede
        function changeNetwork() {
            const networks = ['5G', '4G LTE', 'WiFi 6', 'Fibra'];
            const currentIndex = networks.indexOf(state.networkType);
            state.networkType = networks[(currentIndex + 1) % networks.length];
            
            const emojis = {
                '5G': '📱',
                '4G LTE': '📶',
                'WiFi 6': '📡',
                'Fibra': '🌐'
            };
            
            networkType.textContent = `${emojis[state.networkType]} ${state.networkType} - Conectado`;
            
            // Resetar e simular nova velocidade
            resetData();
            setTimeout(() => {
                state.targetSpeed = Math.random() * 600 + 100;
                animateSpeed();
            }, 500);
        }

        // Inicialização
        function init() {
            drawSpeedometer(0);
            
            // Simular velocidade inicial
            setTimeout(() => {
                state.targetSpeed = 300 + Math.random() * 300;
                animateSpeed();
                lastUpdate.textContent = 'Último teste: ' + new Date().toLocaleTimeString();
            }, 1000);
            
            // Atualização periódica
            setInterval(() => {
                if (!state.isTestRunning && state.currentSpeed > 0) {
                    state.targetSpeed = Math.max(0, Math.min(800, state.targetSpeed + (Math.random() - 0.5) * 50));
                    animateSpeed();
                }
            }, 3000);
        }

        // Iniciar aplicação
        init();
    </script>
</body>
</html>
